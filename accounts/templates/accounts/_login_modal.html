<form method="POST" action="{% url 'accounts:login' %}" id="loginForm">
    {% csrf_token %}
    <div class="form-group mb-3">
        <label class="mb-2">شماره موبایل</label>
        <input type="text" name="mobile" class="form-control" placeholder="۰۹۱۲۳۴۵۶۷۸۹">
    </div>
    <div class="form-group mb-3">
        <label class="mb-2">رمز عبور</label>
        <input type="password" name="password" class="form-control" placeholder="رمز عبور">
    </div>
    <div class="form-group mb-3">
        <div class="d-flex align-items-center justify-content-between">
            <div class="flex-1">
                <input id="dd" class="checkbox-custom" name="dd" type="checkbox">
                <label for="dd" class="checkbox-custom-label">مرا به خاطر بسپار</label>
            </div>
            <div class="eltio_k2">
                <a href="{% url 'accounts:forgot_password' %}">رمز عبور را فراموش کردید؟</a>
            </div>
        </div>
    </div>
    <div class="form-group mb-3">
        <button type="submit" class="btn btn-md full-width bg-dark text-light fs-md ft-medium">
            ورود
        </button>
    </div>
    <div class="form-group text-center mb-0">
        <p class="extra">
            عضو نیستید؟
            <a href="{% url 'accounts:signup' %}" class="text-dark">ثبت‌نام کنید</a>
        </p>
    </div>
</form>
