{% extends "base/base.html" %}
{% load static %}

{% block hero_content %}

{% include 'base/navbar.html' %}
<section class="middle">
    <div class="container">
        <div class="row align-items-start justify-content-center">
            <div class="col-xl-6 col-lg-6 col-md-12 col-sm-12">

                {% if error %}
                <div class="alert alert-danger mb-3">{{ error }}</div>
                {% endif %}

                <form method="POST" action="{% url 'accounts:reset_password' %}" class="border p-3 rounded">
                    {% csrf_token %}

                    <div class="text-center mb-4">
                        <h5>رمز عبور جدید</h5>
                    </div>

                    <div class="form-group mb-3">
                        <label class="mb-2">رمز عبور جدید *</label>
                        <input type="password" name="password" class="form-control"
                               placeholder="رمز عبور جدید" required>
                    </div>

                    <div class="form-group mb-3">
                        <label class="mb-2">تکرار رمز عبور *</label>
                        <input type="password" name="confirm_password" class="form-control"
                               placeholder="تکرار رمز عبور" required>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn btn-md full-width bg-dark text-light fs-md ft-medium">
                            ذخیره رمز عبور
                        </button>
                    </div>
                </form>

            </div>
        </div>
    </div>
</section>

{% include 'base/footer.html' %}

{% endblock %}
