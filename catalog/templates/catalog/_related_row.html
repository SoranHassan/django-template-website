{% comment %} ردیف اسلایدی محصولات — از تگ product_row استفاده کنید {% endcomment %}
{% if row_products %}
<section class="middle pt-4 pb-2">
    <div class="container">
        <div class="row justify-content-center mb-2">
            <div class="col-xl-12 d-flex align-items-center gap-3 sec-accent">
                <h4 class="ft-bold mb-0">{{ row_title }}</h4>
                <a href="/shop/?collection={{ row_kind }}" class="small view-all-link">مشاهده همه ←</a>
            </div>
        </div>
        <div class="products-row-slider" dir="rtl">
            {% for product in row_products %}
            <div class="px-2">{% include 'catalog/_product_card.html' %}</div>
            {% endfor %}
        </div>
    </div>
</section>
{% endif %}
