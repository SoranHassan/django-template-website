{% load static %}
<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}پنل مدیریت{% endblock %} - OramShop</title>
    <link rel="stylesheet" href="{% static 'dashboard/css/style.css' %}">
    <link rel="stylesheet" href="{% static 'vendor/fontawesome/css/all.min.css' %}">
</head>
<body>

{% include 'dashboard/_sidebar.html' %}

<main class="main-content">
    <header class="top-header">
        <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
        <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="{% block search_placeholder %}جستجو...{% endblock %}">
        </div>
        {% include 'dashboard/_header_actions.html' %}
    </header>

    <div class="dashboard-content">
        {% block content %}{% endblock %}
    </div>
</main>

<div class="overlay" id="overlay"></div>
<script src="{% static 'dashboard/js/script.js' %}"></script>
<script>
    const si = document.getElementById('searchInput');
    if (si) si.addEventListener('input', function () {
        const term = this.value.toLowerCase();
        document.querySelectorAll('.data-table tbody tr').forEach(row => {
            row.style.display = row.textContent.toLowerCase().includes(term) ? '' : 'none';
        });
    });
</script>
{% block js %}{% endblock %}
</body>
</html>
