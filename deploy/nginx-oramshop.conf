# OramShop nginx configuration
# Place at:  /etc/nginx/sites-available/oramshop
# Enable:    sudo ln -s /etc/nginx/sites-available/oramshop /etc/nginx/sites-enabled/
# Test+load: sudo nginx -t && sudo systemctl reload nginx
#
# TLS certificates (all 4 hostnames in one cert):
#   sudo certbot --nginx -d oramshop.ir -d www.oramshop.ir -d oramshop.com -d www.oramshop.com

# --- Canonical site: oramshop.ir ---
server {
    listen 443 ssl http2;
    server_name oramshop.ir;

    ssl_certificate     /etc/letsencrypt/live/oramshop.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oramshop.ir/privkey.pem;

    client_max_body_size 20M;

    location /static/ {
        alias /srv/oramshop/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        alias /srv/oramshop/media/;
        expires 7d;
    }

    location / {
        proxy_pass http://unix:/run/oramshop/gunicorn.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Branded page when the app itself is down/restarting (deploy, crash)
    error_page 502 503 504 /static/50x.html;
}

# --- Everything else (www + .com) -> 301 to the canonical domain ---
server {
    listen 443 ssl http2;
    server_name www.oramshop.ir oramshop.com www.oramshop.com;

    ssl_certificate     /etc/letsencrypt/live/oramshop.ir/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/oramshop.ir/privkey.pem;

    return 301 https://oramshop.ir$request_uri;
}

# --- HTTP -> HTTPS ---
server {
    listen 80;
    server_name oramshop.ir www.oramshop.ir oramshop.com www.oramshop.com;
    return 301 https://oramshop.ir$request_uri;
}
