<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 360" fill="none">
  <!-- زن شیک‌پوش — سیلوئت لوکس با لباس شب و خطوط سایان -->
  <defs>
    <linearGradient id="wg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#151018"/>
      <stop offset="1" stop-color="#241a28"/>
    </linearGradient>
    <linearGradient id="wd" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1c1420"/>
      <stop offset="1" stop-color="#31212f"/>
    </linearGradient>
  </defs>
  <!-- موی بلند -->
  <path d="M120 14c16 0 26 12 26 28 0 26 6 44 10 56l-14 6c-2-6-4-10-5-18h-34c-1 8-3 12-5 18l-14-6c4-12 10-30 10-56 0-16 10-28 26-28z" fill="#0d0a10"/>
  <!-- صورت -->
  <path d="M120 26c11 0 19 9 19 21 0 12-8 23-19 23s-19-11-19-23c0-12 8-21 19-21z" fill="url(#wg)"/>
  <!-- گردن -->
  <path d="M113 68h14l3 14-10 8-10-8 3-14z" fill="url(#wg)"/>
  <!-- گوشواره -->
  <circle cx="99" cy="52" r="2.2" fill="#00e6ff"/>
  <circle cx="141" cy="52" r="2.2" fill="#00e6ff"/>
  <!-- بالاتنه لباس -->
  <path d="M96 92c8-6 16-10 24-10s16 4 24 10c4 10 6 22 6 34l-8 26h-44l-8-26c0-12 2-24 6-34z" fill="url(#wd)"/>
  <!-- گردنبند -->
  <path d="M110 88c3 5 6 7 10 7s7-2 10-7" stroke="#00e6ff" stroke-width="1.6" stroke-linecap="round" opacity=".9"/>
  <!-- کمر -->
  <path d="M98 152h44l-4 10h-36l-4-10z" fill="#00b8cc" opacity=".85"/>
  <!-- دامن بلند -->
  <path d="M94 162h52c8 40 14 96 16 148-16 8-38 12-42 12s-26-4-42-12c2-52 8-108 16-148z" fill="url(#wd)"/>
  <!-- چاک دامن با نور -->
  <path d="M132 168c6 40 10 88 12 134" stroke="#00e6ff" stroke-width="1.4" stroke-linecap="round" opacity=".5"/>
  <path d="M104 168c-4 34-8 76-10 118" stroke="#00e6ff" stroke-width="1" stroke-linecap="round" opacity=".3"/>
  <!-- دست‌ها -->
  <path d="M96 96c-8 10-12 30-13 52l10 6 8-42-5-16zM144 96c8 10 12 30 13 52l-10 6-8-42 5-16z" fill="url(#wg)"/>
  <!-- دستبند -->
  <rect x="88" y="146" width="9" height="6" rx="3" fill="#00e6ff"/>
  <!-- کیف دستی -->
  <path d="M148 150c8 0 13 6 13 14v10h-18v-10c0-8 2-14 5-14z" fill="#0d0a10"/>
  <path d="M150 150c0-6 3-10 6-10s6 4 6 10" stroke="#00b8cc" stroke-width="1.6" fill="none"/>
  <!-- سایه -->
  <ellipse cx="120" cy="326" rx="50" ry="5" fill="#00e6ff" opacity=".14"/>
</svg>
