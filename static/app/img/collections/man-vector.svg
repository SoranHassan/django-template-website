  </defs>
  <!-- سر -->
  <path d="M120 22c13 0 22 10 22 24 0 10-4 19-10 24l-2 8h-20l-2-8c-6-5-10-14-10-24 0-14 9-24 22-24z" fill="url(#mg)"/>
