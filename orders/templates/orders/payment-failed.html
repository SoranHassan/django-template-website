{% extends "base/base.html" %}
{% load static %}

{% block hero_content %}

{% include 'base/navbar.html' %}
<section class="middle">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-8 col-xl-5 text-center">
                <div class="p-4 d-inline-flex align-items-center justify-content-center circle bg-light-danger text-danger mx-auto mb-4">
                    <i class="lni lni-close fs-lg"></i>
                </div>
                <h2 class="mb-2 ft-bold">پرداخت ناموفق</h2>
                <p class="ft-regular fs-md mb-3">
                    متأسفانه پرداخت سفارش <span class="text-dark">#{{ order.pk }}</span> با موفقیت انجام نشد.
                </p>
                {% if error %}
                <div class="alert alert-danger mb-4">{{ error }}</div>
                {% endif %}
                <div class="d-flex gap-3 justify-content-center">
                    <a class="btn btn-dark" href="{% url 'orders:checkout' %}">
                        تلاش مجدد
                    </a>
                    <a class="btn btn-light" href="{% url 'catalog:index' %}">
                        بازگشت به خانه
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>

{% include 'base/footer.html' %}

{% endblock %}
